<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Derivadas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffb6d9,#ffd6ec);
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#d63384;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #ff8cc6;
    border-radius:10px;
    margin-bottom:15px;
    box-sizing: border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    background:#ff4fa3;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#e6398e;
}

.resultado{
    margin-top:20px;
    padding:15px;
    background:#fff0f7;
    border-radius:10px;
}

.paso{
    background:white;
    padding:10px;
    margin-top:10px;
    border-left:5px solid #ff4fa3;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Calculadora de Derivadas 🌸</h1>

<input type="text" id="funcion" 
    placeholder="Ejemplo: sen(2x) , cos(x)^2 , e^(2x) , ln(3x+1) , x^3 + 5*x^2 - 2*x + 1">

<button onclick="resolver()">Calcular Derivada</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

// Convierte la expresión escrita por el usuario a una expresión válida para math.js
function preprocesarFuncion(expr) {
    let f = expr.trim();
    
    // 1. Reemplazar sen, cos, tan, ln por sin, cos, tan, log (ln lo soporta mathjs como log)
    f = f.replace(/sen\s*\(/gi, 'sin(');
    f = f.replace(/sen([a-z0-9\(])/gi, 'sin($1'); // sen2x -> sin2x (aún falta convertir 2x)
    f = f.replace(/cos\s*\(/gi, 'cos(');
    f = f.replace(/tan\s*\(/gi, 'tan(');
    f = f.replace(/ln\s*\(/gi, 'log(');   // math.js usa log para log natural
    
    // 2. Agregar multiplicación implícita: 2x -> 2*x , (x+1)(x-1) -> (x+1)*(x-1)
    f = f.replace(/(\d)([a-zA-Z(])/g, '$1*$2');      // 2x -> 2*x
    f = f.replace(/\)([a-zA-Z(])/g, ')*$1');         // )(x -> )*(x
    f = f.replace(/\)(\d+)/g, ')*$1');               // )(2 -> )*2
    f = f.replace(/([a-zA-Z])(\d+)/g, '$1^$2');      // x2 -> x^2 (pero cuidado, mejor no, lo dejamos)
    // Para casos como "2 sen(x)" -> "2*sin(x)"
    f = f.replace(/(\d+)\s+(sin|cos|tan|log)/g, '$1*$2');
    
    // 3. Convertir potencias implícitas: sin^2(x) -> (sin(x))^2  OJO: math.js entiende sin(x)^2
    // Pero si el usuario escribe sin^2(x), lo transformamos a (sin(x))^2
    f = f.replace(/(sin|cos|tan|log)\^(\d+)\s*\(([^)]+)\)/gi, '($1($3))^$2');
    
    // 4. Convertir e^algo a exp(algo) (math.js entiende exp)
    f = f.replace(/e\^([^\s\+\-\*\/\(\)]+)/g, 'exp($1)');
    f = f.replace(/e\^\(([^)]+)\)/g, 'exp($1)');
    
    // 5. Detectar argumentos sin paréntesis: sen2x -> sin(2*x) , cos3x -> cos(3*x)
    f = f.replace(/sin(\d+)([a-z])/gi, 'sin($1*$2)');
    f = f.replace(/cos(\d+)([a-z])/gi, 'cos($1*$2)');
    f = f.replace(/tan(\d+)([a-z])/gi, 'tan($1*$2)');
    f = f.replace(/sin(\d+)/gi, 'sin($1)');
    f = f.replace(/cos(\d+)/gi, 'cos($1)');
    f = f.replace(/tan(\d+)/gi, 'tan($1)');
    
    // 6. Caso especial: "senx" (sin número) -> sin(x)
    f = f.replace(/sen([a-z])/gi, 'sin($1)');
    f = f.replace(/cos([a-z])/gi, 'cos($1)');
    f = f.replace(/tan([a-z])/gi, 'tan($1)');
    
    // 7. Asegurar multiplicación entre constante y función trigonométrica: 2sin(x) -> 2*sin(x)
    f = f.replace(/(\d+)(sin|cos|tan|log)/g, '$1*$2');
    
    // 8. Reemplazar ^ por ** para math.js (opcional, math.js acepta ^ también, pero por seguridad)
    // f = f.replace(/\^/g, '**');  // math.js entiende ^, lo dejamos igual
    
    console.log("Expresión preprocesada:", f);
    return f;
}

function resolver(){

    let entradaUsuario = document.getElementById("funcion").value;
    let salida = document.getElementById("resultado");
    
    if (!entradaUsuario.trim()) {
        salida.innerHTML = `<div class="paso">❌ Ingresa una función válida.</div>`;
        return;
    }

    try {
        let funcionProcesada = preprocesarFuncion(entradaUsuario);
        
        // Calcular derivada usando math.derivative (requiere variable 'x')
        let derivada = math.derivative(funcionProcesada, 'x');
        let derivadaStr = derivada.toString();
        
        // Formatear la derivada para que se vea más bonita (opcional)
        derivadaStr = derivadaStr.replace(/\*/g, '·');  // cambia * por · (más estético)
        
        // Mostrar resultado con pasos detallados
        salida.innerHTML = `
            <h2>📐 Resultado de la derivada</h2>
            
            <div class="paso">
                <b>🎯 Función original:</b><br>
                f(x) = ${entradaUsuario}
            </div>
            
            <div class="paso">
                <b>🔧 Expresión interpretada:</b><br>
                ${funcionProcesada}
            </div>
            
            <div class="paso">
                <b>📖 Paso 1:</b><br>
                Identificamos la variable: <b>x</b> (derivamos respecto a x).
            </div>
            
            <div class="paso">
                <b>📖 Paso 2:</b><br>
                Aplicamos reglas de derivación automáticamente:
                <ul>
                    <li>Regla de la potencia: d/dx [x^n] = n·x^(n-1)</li>
                    <li>Regla trigonométrica: d/dx [sin(u)] = cos(u) · u'</li>
                    <li>Regla del producto/cociente/cadena según corresponda.</li>
                </ul>
            </div>
            
            <div class="paso">
                <b>✅ Paso 3 - Resultado simbólico:</b><br>
                <b>f'(x) = ${derivadaStr}</b>
            </div>
            
            <div class="paso">
                <em>🌸 Nota: La derivada se calculó usando math.js (engine matemático).</em>
            </div>
        `;
        
    } catch(error) {
        console.error(error);
        salida.innerHTML = `
            <div class="paso">
                <b>⚠️ Error:</b> No se pudo derivar la expresión.
                <br><br>
                <b>Posibles causas:</b>
                <ul>
                    <li>Usaste una función no reconocida (ej: "csc", "sec" → no soportadas nativamente).</li>
                    <li>Olvidaste poner paréntesis en funciones: <b>sin x</b> → debe ser <b>sin(x)</b>.</li>
                    <li>Multiplicación implícita no clara: <b>2x</b> sí funciona, pero <b>x y</b> no (solo variable x).</li>
                </ul>
                <b>Ejemplos que SÍ funcionan:</b><br>
                • sen(2x)  →  derivada: 2·cos(2x)<br>
                • cos(x)^2  →  derivada: -2·cos(x)·sin(x)<br>
                • e^(2x)  →  derivada: 2·e^(2x)<br>
                • ln(3x+1)  →  derivada: 3/(3x+1)<br>
                • x^3 + 5*x^2 - 2*x + 1<br>
                • sin(x)/x<br>
            </div>
        `;
    }
}

// Agregar funcionalidad de tecla Enter
document.getElementById("funcion").addEventListener("keypress", function(e) {
    if (e.key === "Enter") resolver();
});

// Ejemplo inicial al cargar la página
window.onload = function() {
    // Opcional: mostrar un ejemplo de bienvenida
    document.getElementById("funcion").value = "sen(2x)";
    resolver();
};

</script>
</body>
</html>
